<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #0f3460; }

    select {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #0f3460; }

    #resultCount {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1.5px solid #eee;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    thead th:hover { background: #eef0f4; }

    thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 0.7rem; }
    thead th.active .sort-icon { opacity: 1; color: #0f3460; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f8fc; }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-cell .name { font-weight: 600; }
    .name-cell .email { font-size: 0.8rem; color: #888; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    #loadingRow td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .container { padding: 0 12px; }
      td:nth-child(4), th:nth-child(4),
      td:nth-child(6), th:nth-child(6) { display: none; }
      .form-grid { grid-template-columns: 1fr; }
    }

    /* Task 1: Add Employee - Add Employee Button */
    .btn-primary {
      padding: 10px 18px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #1565c0; }

    .btn-secondary {
      padding: 10px 18px;
      background: white;
      color: #555;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #f5f5f5; }

    /* Task 1 & 2: Add/Edit Employee - Add/Edit Employee Form */
    .add-form-panel {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .add-form-panel h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
    }
    /* Scoped to form-group to avoid overriding toolbar select */
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #0f3460; }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .form-message {
      font-size: 0.85rem;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .form-message.error   { background: #fce4ec; color: #c2185b; display: block; }
    .form-message.success { background: #e8f5e9; color: #2e7d32; display: block; }

    /* Task 2: Edit Employee - Edit button */
    .btn-edit {
      padding: 5px 12px;
      font-size: 0.8rem;
      background: white;
      color: #0f3460;
      border: 1.5px solid #0f3460;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-edit:hover { background: #e8f0fe; }

    /* Task 3: Delete Employee - Delete button, matches existing error color */
    .btn-delete {
      padding: 5px 12px;
      font-size: 0.8rem;
      background: white;
      color: #c2185b;
      border: 1.5px solid #c2185b;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #fce4ec; }

    /* Task 3: Delete confirmation modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;                          /* covers entire viewport */
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      max-width: 400px;
      width: 90%;
    }
    .modal h3 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .modal p  { font-size: 0.88rem; color: #666; margin-bottom: 24px; }

    /* Task 4: Pagination bar */
    .pagination {
      display: none; /* shown via JS only when totalPages > 1 */
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .pagination #pageIndicator {
      font-size: 0.85rem;
      color: #666;
      min-width: 110px;
      text-align: center;
      white-space: nowrap;
    }
    /* Task 4: Dim disabled Prev/Next buttons instead of hiding them — preserves layout */
    .pagination button:disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    /* Task 5: Department Salary Pie Chart  */
    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-top: 20px; /* spacing below stats row */
    }

    /* Task 4: top margin to separate chart card from table card */
    .table-wrap { margin-top: 20px; }
    .chart-card h2 {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 20px;
    }
    /* Task 5: Flex row — canvas (pie) centered left, legend right */
    .chart-body {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
    }
   
    #salaryChart { display: block; flex-shrink: 0; }
    /* Task 5: HTML legend — each row is a colored dot + text */
    .chart-legend { display: flex; flex-direction: column; gap: 10px; }
    .legend-item  { display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: #1a1a2e; }
    .legend-dot   { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-text  { white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.1)"/>
    <circle cx="18" cy="14" r="5" fill="white" opacity="0.9"/>
    <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  </svg>
  <div>
    <h1>Employee Directory</h1>
    <p>Manage and view all company employees</p>
  </div>
</header>

<div class="container">

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <span class="label">Total Employees</span>
      <span class="value" id="statTotal">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Departments</span>
      <span class="value" id="statDepts">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Avg. Salary</span>
      <span class="value" id="statSalary">—</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, position, or email…" />
    </div>
    <select id="deptFilter">
      <option value="all">All Departments</option>
    </select>
    <span id="resultCount"></span>
    <!-- Task 1: Add Employee - button -->
    <button class="btn-primary" onclick="showAddForm()">Add Employee</button>
  </div>

  <!-- Task 1 & 2: Shared Add/Edit form — title and submit button text set dynamically -->
  <div class="add-form-panel" id="employeeFormPanel" style="display:none">
    <h2 id="formTitle">Add New Employee</h2>
    <div class="form-message" id="formMessage"></div>
    <form onsubmit="submitEmployeeForm(event)">
      <!-- empty = add mode; populated = edit mode (stores employee id) -->
      <input type="hidden" id="fEditId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="fName" required placeholder="Full name" />
        </div>
        <!-- select (not free-text) to ensure department name consistency across records -->
        <div class="form-group">
          <label>Department *</label>
          <select id="fDepartment" required>
            <option value="">Select department…</option>
          </select>
        </div>
        <div class="form-group">
          <label>Position *</label>
          <input type="text" id="fPosition" required placeholder="Job title" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="fEmail" required placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="text" id="fPhone" required placeholder="e.g. 555-0100" />
        </div>
        <div class="form-group">
          <label>Hire Date *</label>
          <input type="date" id="fHireDate" required />
        </div>
        <div class="form-group">
          <label>Salary *</label>
          <input type="number" id="fSalary" required min="0" placeholder="Annual salary" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="hideEmployeeForm()">Cancel</button>
        <button type="submit" class="btn-primary" id="formSubmitBtn">Save Employee</button>
      </div>
    </form>
  </div>

  <!-- Task 5: Salary by Department pie chart -->
  <div class="chart-card">
    <h2>Salary by Department</h2>
    <div class="chart-body">
      <canvas id="salaryChart" width="220" height="220"></canvas>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="id">ID <span class="sort-icon">▲</span></th>
          <th data-col="name">Employee <span class="sort-icon">▲</span></th>
          <th data-col="department">Department <span class="sort-icon">▲</span></th>
          <th data-col="position">Position <span class="sort-icon">▲</span></th>
          <th data-col="hire_date">Hire Date <span class="sort-icon">▲</span></th>
          <th data-col="salary">Salary <span class="sort-icon">▲</span></th>
          <!-- Task 2: Edit Employee - Edit column -->
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Task 2: Edit Employee - Edit column -->
        <tr id="loadingRow"><td colspan="7">Loading employees…</td></tr>
      </tbody>
    </table>
    <!-- Task 4: Pagination controls — Previous / Page X of Y / Next -->
    <div class="pagination" id="pagination">
      <button class="btn-secondary" id="btnPrev" onclick="goToPage(currentPage - 1)">&#8592; Previous</button>
      <span id="pageIndicator">Page 1 of 1</span>
      <button class="btn-secondary" id="btnNext" onclick="goToPage(currentPage + 1)">Next &#8594;</button>
    </div>
  </div>

</div>

<script>
  const DEPT_COLORS = {
    'Engineering': ['#e8f4fd', '#1565c0'],
    'Marketing':   ['#fce4ec', '#c2185b'],
    'HR':          ['#e8f5e9', '#2e7d32'],
    'Finance':     ['#fff8e1', '#f57f17'],
    'Design':      ['#f3e5f5', '#6a1b9a'],
  };

  const AVATAR_COLORS = ['#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#795548','#607d8b','#f06292','#26a69a'];

  // Task 5: Fixed palette cycled with index % length — safe for any number of departments
  const CHART_PALETTE = [
    '#2563eb', // blue
    '#f97316', // orange
    '#16a34a', // green
    '#9333ea', // purple
    '#db2777', // pink
    '#eab308', // yellow
  ];

  let sortCol = 'id';
  let sortOrder = 'asc';
  let allEmployees = [];

  // Task 4: Pagination state — currentPage resets to 1 on any filter/sort change
  const PAGE_SIZE = 5;
  let currentPage = 1;

  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
  }

  function deptBadge(dept) {
    const [bg, text] = DEPT_COLORS[dept] || ['#e0e0e0', '#555'];
    return `<span class="badge" style="background:${bg};color:${text}">${dept}</span>`;
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function formatSalary(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
  }

  function renderTable(employees) {
    const tbody = document.getElementById('tableBody');
    const total = employees.length;
    document.getElementById('resultCount').textContent = `${total} result${total !== 1 ? 's' : ''}`;

    if (total === 0) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <p>No employees match your search.</p>
        </div>
      </td></tr>`;
      // Task 4: no results — hide pagination
      updatePagination(0);
      return;
    }

    // Task 4: clamp currentPage then slice to the rows for this page
    const totalPages = Math.ceil(total / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageRows = employees.slice(start, start + PAGE_SIZE);

    tbody.innerHTML = pageRows.map(emp => `
      <tr>
        <td style="color:#aaa;font-size:0.82rem">#${emp.id}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${avatarColor(emp.name)}">${initials(emp.name)}</div>
            <div>
              <div class="name">${emp.name}</div>
              <div class="email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${deptBadge(emp.department)}</td>
        <td>${emp.position}</td>
        <td>${formatDate(emp.hire_date)}</td>
        <td style="font-weight:600">${formatSalary(emp.salary)}</td>
        <!-- Task 2 & 3: Edit / Delete buttons -->
        <td style="display:flex;gap:6px">
          <button class="btn-edit"   onclick="openEditForm(${emp.id})">Edit</button>
          <button class="btn-delete" onclick="deleteEmployee(${emp.id}, '${emp.name.replace(/'/g, "\\'")}')">Delete</button>
        </td>
      </tr>
    `).join('');

    // Task 4: refresh Prev/Next state and page indicator after every render
    updatePagination(total);
  }

  function updateSortHeaders() {
    document.querySelectorAll('thead th').forEach(th => {
      const col = th.dataset.col;
      th.classList.toggle('active', col === sortCol);
      const icon = th.querySelector('.sort-icon');
      if (!icon) return; // Task 2: skip Actions column (no sort icon)
      if (col === sortCol) {
        icon.textContent = sortOrder === 'asc' ? '▲' : '▼';
      } else {
        icon.textContent = '▲';
      }
    });
  }

  async function loadDepartments() {
    const res = await fetch('/api/departments');
    const depts = await res.json();
    const sel = document.getElementById('deptFilter');
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
    document.getElementById('statDepts').textContent = depts.length;
  }

  async function loadEmployees() {
    const search = document.getElementById('searchInput').value;
    const department = document.getElementById('deptFilter').value;
    const params = new URLSearchParams({ search, department, sort: sortCol, order: sortOrder });
    const res = await fetch(`/api/employees?${params}`);
    allEmployees = await res.json();
    currentPage = 1; // Task 4: any filter/search/sort change always resets to page 1
    renderTable(allEmployees);

    if (department === 'all' && !search) {
      document.getElementById('statTotal').textContent = allEmployees.length;
      const avg = allEmployees.reduce((s, e) => s + e.salary, 0) / (allEmployees.length || 1);
      document.getElementById('statSalary').textContent = '$' + Math.round(avg / 1000) + 'k';
    }
  }

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortOrder = 'asc';
      }
      updateSortHeaders();
      loadEmployees();
    });
  });

  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadEmployees, 250);
  });

  document.getElementById('deptFilter').addEventListener('change', loadEmployees);

  // Task 1 & 2 — Shared: populate department dropdown
  async function populateFormDepts(selected = '') {
    const res = await fetch('/api/departments');
    const depts = await res.json();
    const sel = document.getElementById('fDepartment');
    while (sel.options.length > 1) sel.remove(1); // clear before repopulating
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      if (d === selected) opt.selected = true;//edit mode: pre-select current department
      sel.appendChild(opt);
    });
  }

  // Task 1 — Add Employee: open shared form in add mode
  function showAddForm() {
    document.getElementById('formTitle').textContent     = 'Add New Employee';
    document.getElementById('formSubmitBtn').textContent = 'Save Employee';
    document.getElementById('fEditId').value = ''; // empty = add mode
    document.getElementById('formMessage').className = 'form-message';
    const panel = document.getElementById('employeeFormPanel');
    panel.style.display = 'block';
    populateFormDepts();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Task 1 & 2 — Shared: hide and reset form
  function hideEmployeeForm() {
    const panel = document.getElementById('employeeFormPanel');
    panel.style.display = 'none';
    panel.querySelector('form').reset();
  }

  // Task 2 — Edit Employee: open shared form in edit mode, pre-filled with row data
  function openEditForm(id) {
    const emp = allEmployees.find(e => e.id === id);
    if (!emp) return;
    document.getElementById('formTitle').textContent     = 'Edit Employee';
    document.getElementById('formSubmitBtn').textContent = 'Save Changes';
    document.getElementById('formMessage').className = 'form-message';
    document.getElementById('fEditId').value   = emp.id; // non-empty = edit mode
    document.getElementById('fName').value     = emp.name;
    document.getElementById('fPosition').value = emp.position;
    document.getElementById('fEmail').value    = emp.email;
    document.getElementById('fPhone').value    = emp.phone;
    document.getElementById('fHireDate').value = emp.hire_date;
    document.getElementById('fSalary').value   = emp.salary;
    populateFormDepts(emp.department);
    const panel = document.getElementById('employeeFormPanel');
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Task 1 & 2 — Shared submit: POST (add) when fEditId empty, PUT (edit) when fEditId set
  async function submitEmployeeForm(event) {
    event.preventDefault();
    const msg    = document.getElementById('formMessage');
    const editId = document.getElementById('fEditId').value;
    msg.className = 'form-message';

    const body = {
      name:       document.getElementById('fName').value.trim(),
      department: document.getElementById('fDepartment').value,
      position:   document.getElementById('fPosition').value.trim(),
      email:      document.getElementById('fEmail').value.trim(),
      phone:      document.getElementById('fPhone').value.trim(),
      hire_date:  document.getElementById('fHireDate').value,
      salary:     Number(document.getElementById('fSalary').value),
    };

    // identify add/edit mode by editId
    const url    = editId ? `/api/employees/${editId}` : '/api/employees';
    const method = editId ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        hideEmployeeForm();
        loadEmployees();    // refresh table and stats
        loadSalaryChart();  // Task 5: salary totals changed — redraw chart
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to save employee';
        msg.className = 'form-message error';
      }
    } catch (err) {
      msg.textContent = 'Network error: ' + err.message;
      msg.className = 'form-message error';
    }
  }

  // Task 3 — Delete Employee: open confirmation modal
  function deleteEmployee(id, name) {
    document.getElementById('modalTitle').textContent  = `Are you sure you want to delete ${name}?`;
    document.getElementById('modalConfirmBtn').onclick = () => confirmDelete(id);
    document.getElementById('deleteModal').classList.add('active');
  }

  function hideDeleteModal() {
    document.getElementById('deleteModal').classList.remove('active');
  }

  // Task 3 — Delete Employee: confirmed - call DELETE /api/employees/:id
  async function confirmDelete(id) {
    hideDeleteModal();
    const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
    if (res.ok) {
      loadEmployees();    // refresh table and stats
      loadSalaryChart();  // Task 5: salary totals changed — redraw chart
    } else {
      const data = await res.json();
      alert(data.error || 'Failed to delete employee');
    }
  }

  // Task 4: Update pagination controls
  function updatePagination(total) {
    const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    const bar = document.getElementById('pagination');
    //Hide bar - one page
    bar.style.display = totalPages > 1 ? 'flex' : 'none';
    document.getElementById('btnPrev').disabled     = currentPage <= 1;
    document.getElementById('btnNext').disabled     = currentPage >= totalPages;
    document.getElementById('pageIndicator').textContent = `Page ${currentPage} of ${totalPages}`;
  }

  // Task 4: Change page + re-render current allEmployees
  function goToPage(page) {
    const totalPages = Math.ceil(allEmployees.length / PAGE_SIZE) || 1;
    currentPage = Math.max(1, Math.min(page, totalPages));
    renderTable(allEmployees);
  }

  // Task 5: Build a color array once — shared by pie + legend to guarantee they match.
  // Known departments reuse DEPT_COLORS[dept][1] (same vivid accent as badge).
  // Unknown departments cycle through CHART_PALETTE; fi tracks only unknowns so
  // adding a new known dept never shifts the fallback index for existing unknowns.
  function buildChartColors(data) {
    let fi = 0;
    return data.map(d => {
      const known = DEPT_COLORS[d.department];
      return known ? known[1] : CHART_PALETTE[fi++ % CHART_PALETTE.length];
    });
  }

  // Task 5: Fetch salary aggregates, compute grandTotal + colors once, delegate to renderers
  async function loadSalaryChart() {
    const res  = await fetch('/api/salary-by-department');
    const data = await res.json();
    // Filter out rows with missing/invalid values before rendering
    const valid      = data.filter(d => d.department && Number.isFinite(d.total) && d.total > 0);
    const grandTotal = valid.reduce((s, d) => s + d.total, 0); // computed once, shared below
    const colors     = buildChartColors(valid);
    drawPieChart(document.getElementById('salaryChart'), valid, colors, grandTotal);
    renderChartLegend(valid, colors, grandTotal);
  }

  // Task 5: Draw only the pie slices onto the canvas — no legend, no text
  function drawPieChart(canvas, data, colors, grandTotal) {
    const dpr  = window.devicePixelRatio || 1;
    const SIZE = 220; // logical canvas size (square)

    canvas.width        = SIZE * dpr;
    canvas.height       = SIZE * dpr;
    canvas.style.width  = SIZE + 'px';
    canvas.style.height = SIZE + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, SIZE, SIZE); // always clear before drawing

    // Guard: no data or all-zero salaries — show a placeholder message
    if (!data.length || grandTotal === 0) {
      ctx.fillStyle = '#aaa';
      ctx.font      = '13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No salary data available', SIZE / 2, SIZE / 2);
      return;
    }

    const cx = SIZE / 2, cy = SIZE / 2, r = 90; // pie centered in canvas
    let angle = -Math.PI / 2; // start from 12 o'clock

    // Stroke style is constant across all slices — set once outside the loop
    ctx.strokeStyle = '#fff'; // white divider between slices
    ctx.lineWidth   = 2;

    data.forEach((d, i) => {
      const sweep = (d.total / grandTotal) * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, angle, angle + sweep);
      ctx.closePath();
      ctx.fillStyle = colors[i];
      ctx.fill();
      ctx.stroke();
      angle += sweep;
    });
  }

  // Task 5: Render legend as HTML — grandTotal passed in, no redundant recompute
  function renderChartLegend(data, colors, grandTotal) {
    const legend = document.getElementById('chartLegend');

    if (!data.length || grandTotal === 0) {
      legend.innerHTML = '';
      return;
    }

    legend.innerHTML = data.map((d, i) => {
      const pct = ((d.total / grandTotal) * 100).toFixed(1);
      return `
        <div class="legend-item">
          <span class="legend-dot" style="background:${colors[i]}"></span>
          <span class="legend-text">${d.department} — ${pct}% · ${formatSalary(d.total)}</span>
        </div>`;
    }).join('');
  }

  updateSortHeaders();
  loadDepartments();
  loadEmployees();
  loadSalaryChart(); // Task 5: initial chart render
</script>

<!-- Task 3: Delete confirmation modal — outside container so it overlays everything -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3 id="modalTitle">Delete?</h3>
    <p id="modalBody">This action cannot be undone.</p>
    <!-- reuse existing btn-secondary and btn-delete classes -->
    <div class="form-actions">
      <button class="btn-secondary" onclick="hideDeleteModal()">Cancel</button>
      <button class="btn-delete"    id="modalConfirmBtn">Delete</button>
    </div>
  </div>
</div>

</body>
</html>
